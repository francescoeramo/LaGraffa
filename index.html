<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src https://api.mymemory.translated.net; img-src 'self' data:;" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta name="referrer" content="no-referrer" />
  <title>Il Punto — Notizie</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">Il Punto</div>
      <nav class="nav-cats" id="navCats">
        <button class="cat-btn active" data-cat="all">Tutto</button>
        <button class="cat-btn" data-cat="politica-italiana">Politica IT</button>
        <button class="cat-btn" data-cat="geopolitica">Geopolitica</button>
        <button class="cat-btn" data-cat="conflitti">Conflitti</button>
        <button class="cat-btn" data-cat="ai">AI &amp; Tech</button>
        <button class="cat-btn" data-cat="economia-tech">Economia</button>
        <button class="cat-btn" data-cat="preferiti">★ Preferiti</button>
        <button class="cat-btn" data-cat="leggi-dopo">⏰ Leggi dopo</button>
      </nav>
      <div class="header-right">
        <span class="refresh-timer" id="refreshTimer">Aggiorn. tra 60 min</span>
        <button class="refresh-btn" id="refreshBtn" title="Aggiorna ora">↻</button>
        <button class="theme-toggle" id="themeToggle" aria-label="Cambia tema">🌙</button>
        <button class="menu-toggle" id="menuToggle" aria-label="Menu categorie">☰</button>
      </div>
    </div>
    <div class="mobile-nav" id="mobileNav">
      <button class="cat-btn active" data-cat="all">Tutto</button>
      <button class="cat-btn" data-cat="politica-italiana">Politica IT</button>
      <button class="cat-btn" data-cat="geopolitica">Geopolitica</button>
      <button class="cat-btn" data-cat="conflitti">Conflitti</button>
      <button class="cat-btn" data-cat="ai">AI &amp; Tech</button>
      <button class="cat-btn" data-cat="economia-tech">Economia</button>
      <button class="cat-btn" data-cat="preferiti">★ Preferiti</button>
      <button class="cat-btn" data-cat="leggi-dopo">⏰ Leggi dopo</button>
    </div>
  </header>

  <main>
    <section class="hero-section" id="heroSection">
      <div class="hero-inner">
        <div class="hero-label">Top Story</div>
        <h1 class="hero-title" id="heroTitle"></h1>
        <p class="hero-summary" id="heroSummary"></p>
        <div class="hero-meta">
          <span class="hero-cat" id="heroCat"></span>
          <span class="hero-time" id="heroTime"></span>
          <span class="hero-source" id="heroSource"></span>
        </div>
        <div class="hero-actions">
          <button class="hero-read-btn" id="heroReadBtn">Leggi di più</button>
        </div>
      </div>
    </section>

    <section class="news-grid-section">
      <div class="news-grid" id="newsGrid"></div>
    </section>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal" id="modal">
      <div class="modal-header">
        <button class="modal-close" id="modalClose" aria-label="Chiudi">✕</button>
        <div class="modal-header-actions">
          <button class="translate-btn" id="translateBtn" style="display:none">🌐 Traduci in italiano</button>
          <button class="later-btn" id="modalLaterBtn" aria-label="Leggi dopo" title="Leggi dopo">⏰</button>
          <button class="fav-btn" id="modalFavBtn" aria-label="Aggiungi ai preferiti" title="Aggiungi ai preferiti">★</button>
        </div>
      </div>
      <div class="modal-cat" id="modalCat"></div>
      <h2 class="modal-title" id="modalTitle"></h2>
      <div class="modal-meta">
        <span id="modalSource"></span>
        <span id="modalTime"></span>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-sources-block" id="modalSourcesBlock"></div>
      <a class="modal-link" id="modalLink" href="#" target="_blank" rel="noopener noreferrer">Leggi l'articolo originale →</a>
    </div>
  </div>

  <script src="news.js"></script>
  <script src="app.js"></script>
</body>
</html>
